services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma

    restart: unless-stopped

    volumes:
      - ${KUMA_DATA}:/app/data

    ports:
      - "${KUMA_PORT}:3001"

    networks:
      - proxy_net
      - monitoring_net

networks:
  proxy_net:
    external: true

  monitoring_net:
    external: true
