services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
      - "${NPM_PORT}:81"
    volumes:
      - ${NPM_DATA}:/data
      - ${NPM_CERTS}:/etc/letsencrypt
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
